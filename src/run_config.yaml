run_name: "sj04_walk_pilot"
date: "auto"
data:
  root: "data"
  subjects: [4]

eeg:
  reference_channels: ["TP9", "TP10"]
  sfreq_target: 250
  filter_low: 0.1
  filter_high: 30.0
  bad_channel_z_thresh: 3.5
  detect_bad_channels: false
  apply_ica: false
  use_gedai: true
  trigger_latency_offset: 60
  tmin: -0.2
  tmax: 1.0
  baseline: [-0.2, 0]

conditions:
  - eeg_label: "sit_attend"
    trial_label: "Attend_Sit"
  - eeg_label: "sit_unattend"
    trial_label: "Unattend_Sit"
  - eeg_label: "walk_attend"
    trial_label: "Attend_Walk"
  - eeg_label: "walk_unattend"
    trial_label: "Unattend_Walk"

et:
  folder_map:
    walk_attend: "Attend_Walk"
    walk_unattend: "Unattend_Walk"
    sit_attend: "Attend_Sit"
    sit_unattend: "Unattend_Sit"

erp:
  target_channels: ["Pz"]
  codes: [1, 2, 3]

features:
  p300_window: [0.25, 0.50]

nogo:
  n_folds: 5
  n_epochs: 100
  batch_size: 32
  learning_rate: 0.001
  early_stopping_patience: 10
  save_embeddings: true
  pre_stimulus_gaze_window_ms: 2000
  gaze_max_seq_len: 20
  gaze_encoder_type: "lstm"
  gaze_embedding_dim: 32
  gaze_hidden_dim: 64
  fusion_dropout: 0.3

clip_categories:
  - "sky"
  - "ocean"
  - "water"
  - "people"
  - "vegetation"
  - "trail_ground"
  - "other"
